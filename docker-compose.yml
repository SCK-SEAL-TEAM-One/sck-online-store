services:
  store-service:
    image: store-service:0.0.1
    container_name: store-service
    build:
      context: store-service
    ports:
      - "8000:8000"
    environment:
      - BANK_GATEWAY=thirdparty:8882
      - SHIPPING_GATEWAY=thirdparty:8883
      - POINT_GATEWAY=point-service:8001
      - STORE_WEB_HOST=http://localhost
      - DB_CONNECTION=user:password@(db:3306)/store?parseTime=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=lgtm:4317
      - INSECURE_MODE=true
      - OTEL_SERVICE_NAME=store-service
      - JWT_SECRET=my-secret-key

    depends_on:
      db:
        condition: service_healthy
    restart: always

  point-service:
    image: point-service:0.0.1
    container_name: point-service
    build:
      context: point-service
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=user
      - DB_PASSWORD=password
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - NODE_DEBUG=otel
    restart: always

  db:
    image: mysql:8.3.0
    container_name: db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    volumes:
      - ./tearup/point/init.sql:/docker-entrypoint-initdb.d/point.sql
      - ./tearup/store/init.sql:/docker-entrypoint-initdb.d/store.sql
      - ./tearup/grandall.sql:/docker-entrypoint-initdb.d/grandall.sql
    ports:
      - "3306:3306"
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  seed:
    image: golang:1.24.5
    container_name: seed-users
    working_dir: /app/store-service
    volumes:
      - .:/app
      - shared_data:/shared
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_CONNECTION=user:password@(db:3306)/store
      - OUTPUT_DIR=/shared
    command: ["go", "run", "./cmd/seed/main.go"]

  liquibase:
    build:
      context: .
      dockerfile: db/Dockerfile
    container_name: liquibase
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    working_dir: /liquibase/changelog
    volumes:
      - ./db:/liquibase/changelog
      - shared_data:/liquibase/seed
    command:
      [
        "update",
        "--url=jdbc:mysql://db:3306/store?useSSL=false&allowPublicKeyRetrieval=true",
        "--username=user",
        "--password=password",
        "--changelog-file=changelog-master.yaml",
      ]

  adminer:
    image: adminer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8080:8080

  thirdparty:
    image: store-shipping-gateway:0.0.1
    build:
      context: thirdparty/
    container_name: thirdparty
    restart: always
    ports:
      - "8882:8882"
      - "8883:8883"

  store-web:
    image: store-web:0.1.0
    container_name: store-web
    build:
      context: store-web
    ports:
      - "3000:3000"

  nginx:
    image: mynginx:0.1.0
    container_name: nginx
    build:
      context: nginx
    ports:
      - "80:80"
    # volumes:
    #   - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    depends_on:
      store-service:
        condition: service_started
      store-web:
        condition: service_started

  lgtm:
    image: grafana/otel-lgtm
    container_name: lgtm
    ports:
      - "4317:4317"
      - "4318:4318"
      - "3001:3000" # dashboard

  beyla:
    image: grafana/beyla:latest
    container_name: beyla
    command:
      - /beyla
      - --config=/config/beyla-config.yml
    volumes:
      - ./monitoring/beyla:/config:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys/kernel/config:/sys/kernel/config:ro
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - SYS_RESOURCE
      - NET_ADMIN
    environment:
      - BEYLA_OPEN_PORT=8000
      - BEYLA_PROMETHEUS_PORT=8999
      - BEYLA_TRACE_PRINTER=text
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=beyla-instrumentation
      - BEYLA_LOG_LEVEL=debug
      - BEYLA_NETWORK_DIRECTION=ingress
    privileged: true
    networks:
      - default
    ipc: host
    pid: host
    ports:
      - "8999:8999"
    depends_on:
      store-service:
        condition: service_started
      lgtm:
        condition: service_started

  mysql-exporter:
    image: prom/mysqld-exporter
    ports:
      - "9104:9104"
    volumes:
      - ./monitoring/database/.my.cnf:/.my.cnf
    depends_on:
      - db

  prometheus:
    image: prom/prometheus
    ports:
      - 9090:9090
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  chrome:
    image: selenium/node-chromium:4.25.0
    container_name: node-chrome
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_INSTANCES=5
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_NODE_DRAIN_AFTER_SESSION_COUNT=0

  selenium-hub:
    image: selenium/hub:4.25.0
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    environment:
      - SE_SESSION_RETRY_INTERVAL=2
      - SE_SESSION_TIMEOUT=300
      - SE_DRAIN_TIMEOUT=20

volumes:
  shared_data:
