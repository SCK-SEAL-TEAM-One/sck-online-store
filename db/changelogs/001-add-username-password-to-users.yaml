databaseChangeLog:
  - changeSet:
      id: 001-add-username-password-columns-to-users
      author: developer
      comment: Add username and password columns to Users table
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: username
                  type: VARCHAR(255)
              - column:
                  name: password
                  type: VARCHAR(255)
      rollback:
        - dropColumn:
            tableName: users
            columnName: username
        - dropColumn:
            tableName: users
            columnName: password

  - changeSet:
      id: 002-seed-username-password-from-csv-to-users
      author: developer
      comment: Init username and password to Users table
      changes:
        - createTable:
            tableName: users_staging
            columns:
              - column:
                  name: id
                  type: BIGINT
              - column:
                  name: username
                  type: VARCHAR(255)
              - column:
                  name: password
                  type: VARCHAR(255)
        - loadData:
            - file: ../seed/001-users-with-username-password.csv
              tableName: users_staging
              separator: ","
              encoding: UTF-8
              columns:
                - column:
                    name: id
                    type: NUMERIC
                - column:
                    name: username
                    type: STRING
                - column:
                    name: password
                    type: STRING
        - sql:
            sql: |
              UPDATE users u
              JOIN users_staging s
                ON u.id = s.id
              SET
                u.username = s.username,
                u.password = s.password;
        - dropTable:
            tableName: users_staging
        - modifyDataType:
            tableName: users
            columnName: username
            newDataType: VARCHAR(255) NOT NULL
        - modifyDataType:
            tableName: users
            columnName: password
            newDataType: VARCHAR(255) NOT NULL

      rollback:
        - modifyDataType:
            tableName: users
            columnName: username
            newDataType: VARCHAR(255)
        - modifyDataType:
            tableName: users
            columnName: password
            newDataType: VARCHAR(255)
        - dropTable:
            tableName: users_staging
            ifExists: true
