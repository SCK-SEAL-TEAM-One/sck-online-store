databaseChangeLog:
  - changeSet:
      id: 001-add-username-password-columns-to-users
      author: developer
      comment: Add username and password columns to Users table
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: username
                  type: VARCHAR(255)
              - column:
                  name: password
                  type: VARCHAR(255)
      rollback:
        - dropColumn:
            tableName: users
            columnName: username
        - dropColumn:
            tableName: users
            columnName: password

  - changeSet:
      id: 002-seed-username-password-from-csv-to-users
      author: developer
      comment: Init username and password to Users table
      changes:
        - createTable:
            tableName: users_staging
            columns:
              - column:
                  name: id
                  type: BIGINT
              - column:
                  name: username
                  type: VARCHAR(255)
              - column:
                  name: password
                  type: VARCHAR(255)
        - sql:
            sql: |
              UPDATE users 
              SET
                username = concat('user_', id),
                password = '$2a$10$irzSElrQnaro0pTX/9UHt.GnSUVllfA7Cb8F/YZuqfA16zi6XCQni';
        - modifyDataType:
            tableName: users
            columnName: username
            newDataType: VARCHAR(255) NOT NULL
        - modifyDataType:
            tableName: users
            columnName: password
            newDataType: VARCHAR(255) NOT NULL

      rollback:
        - modifyDataType:
            tableName: users
            columnName: username
            newDataType: VARCHAR(255)
        - modifyDataType:
            tableName: users
            columnName: password
            newDataType: VARCHAR(255)
