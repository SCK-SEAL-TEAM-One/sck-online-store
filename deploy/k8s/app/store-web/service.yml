apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-web-deployment
  labels:
    app: store-web-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: store-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: store-web
    spec:
      containers:
        - name: store-web
          image: siamchamnankit/store-web:ks-egat-260303
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: store-web
spec:
  type: ClusterIP
  selector:
    app: store-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
