apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-slow-query-config
data:
  slow-query.cnf: |
    [mysqld]
    slow_query_log              = 1
    slow_query_log_file         = /var/log/mysql/slow.log
    long_query_time             = 0.5
    log_queries_not_using_indexes = 1
    performance_schema          = ON
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-db
data:
  init-databases.sql: |
    CREATE DATABASE IF NOT EXISTS store CHARACTER SET utf8 COLLATE utf8_general_ci;
    CREATE DATABASE IF NOT EXISTS point CHARACTER SET utf8 COLLATE utf8_general_ci;
    GRANT ALL ON *.* TO 'user'@'%' WITH GRANT OPTION;
    FLUSH PRIVILEGES;
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  selector:
    matchLabels:
      app: mysql
  replicas: 1
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: siamchamnankit/store-database:latest
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: mysql-root-password
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: mysql-password
          volumeMounts:
            - name: mysql-config
              mountPath: /etc/mysql/conf.d/slow-query.cnf
              subPath: slow-query.cnf
              readOnly: true
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: mysql-logs
              mountPath: /var/log/mysql
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root -p$MYSQL_ROOT_PASSWORD
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root -p$MYSQL_ROOT_PASSWORD
            initialDelaySeconds: 45
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: mysql-config
          configMap:
            name: mysql-slow-query-config
        - name: mysql-init
          configMap:
            name: mysql-init-db
        - name: mysql-logs
          emptyDir: {}
